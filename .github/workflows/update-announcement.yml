name: Update Landing Announcement

on:
  workflow_dispatch:
    inputs:
      action:
        description: >
          auto   = generate from recent feat/fix commits since last version bump |
          update = set custom entries (see 'content') |
          clear  = remove the announcement section entirely
        required: true
        default: auto
        type: choice
        options: [auto, update, clear]
      content:
        description: >
          For 'update' only. Pipe-separated entries, one per line.
          Prefix with "NEW:" for the red badge. Plain text only — no HTML in entries.
          Example: NEW: v0.8.0 — rate limiting | v0.7.8 — CI/CD workflows | Listed on MCP registry
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write inputs to files
        run: |
          echo "${{ inputs.action }}"   > /tmp/action.txt
          printf '%s' "${{ inputs.content }}" > /tmp/content.txt

      - name: Build announcement entries
        id: entries
        run: |
          python3 - <<'PY'
          import subprocess, os, re

          with open("/tmp/action.txt") as f:
              action = f.read().strip()
          with open("/tmp/content.txt") as f:
              content = f.read().strip()

          def write_output(value):
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"entries={value}\n")

          if action == "clear":
              write_output("")
          elif action == "update":
              raw = [e.strip() for e in content.split("|") if e.strip()]
              write_output("|||".join(raw))
          else:
              # auto: feat/fix commits since the last version bump
              log = subprocess.check_output(
                  ["git", "log", "--format=%s", "--no-merges"], text=True
              ).splitlines()
              boundary = next(
                  (i for i, m in enumerate(log) if m.startswith("chore: bump version")),
                  len(log)
              )
              entries = []
              for msg in log[:boundary]:
                  for prefix in ("feat: ", "fix: "):
                      if msg.startswith(prefix):
                          clean = msg.split(":", 1)[1].strip()
                          clean = re.sub(r"\s*\(#\d+\)$", "", clean)
                          entries.append("NEW: " + clean)
                          break
              write_output("|||".join(entries[:5]))
          PY

      - name: Patch landing.py
        run: |
          python3 - <<'PY'
          import re, os

          with open("/tmp/action.txt") as f:
              action = f.read().strip()

          raw_entries = os.environ.get("ENTRIES", "")

          with open("src/landing.py") as f:
              source = f.read()

          NEWS_BOX_RE = re.compile(
              r'    <div class="news-box">.*?    </div>', re.DOTALL
          )

          if action == "clear" or not raw_entries.strip():
              new_source = NEWS_BOX_RE.sub("", source)
          else:
              entries = [e.strip() for e in raw_entries.split("|||") if e.strip()]
              lines = []
              for entry in entries:
                  if entry.upper().startswith("NEW:"):
                      text = entry[4:].strip()
                      lines.append(f'      <span class="new-badge">NEW</span> {text}<br>')
                  else:
                      lines.append(f'      &bull; {entry}<br>')

              box = (
                  '    <div class="news-box">\n'
                  '      <strong>Announcements:</strong><br>\n'
                  + "\n".join(lines) + "\n"
                  + '    </div>'
              )
              new_source = NEWS_BOX_RE.sub(box, source)

          with open("src/landing.py", "w") as f:
              f.write(new_source)
          print("landing.py updated")
          PY
        env:
          ENTRIES: ${{ steps.entries.outputs.entries }}

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACTION=$(cat /tmp/action.txt)
          BRANCH="landing-announcement-${GITHUB_RUN_ID}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/landing.py

          if ! git diff --cached --quiet; then
            git commit -m "feat(landing): update announcement section [${ACTION}]"
            git push origin "$BRANCH"
            gh pr create \
              --title "feat(landing): update announcement section [${ACTION}]" \
              --body "Automated update to the landing page announcement section.

          **Action**: \`${ACTION}\`
          **Triggered by**: @${{ github.actor }}

          Review the diff and merge to deploy." \
              --base main
          else
            echo "No changes to landing.py — nothing to PR."
          fi
