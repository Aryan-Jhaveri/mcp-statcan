name: Bump Version

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "server.json"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to set (e.g. 1.0.0). Overrides 'bump' if provided."
        required: false
        type: string
      bump:
        description: "Increment patch/minor/major. Used only when 'version' is empty."
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  bump:
    # Skip when the push is itself a version bump commit to prevent loops
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new version
        id: ver
        run: |
          current=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              print(re.search(r'^version = \"(.+?)\"', f.read(), re.M).group(1))
          ")
          if [ -n "${{ inputs.version }}" ]; then
            new="${{ inputs.version }}"
          else
            IFS='.' read -r maj min pat <<< "$current"
            case "${{ inputs.bump }}" in
              major) new="$((maj+1)).0.0" ;;
              minor) new="${maj}.$((min+1)).0" ;;
              *)     new="${maj}.${min}.$((pat+1))" ;;
            esac
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "new=$new"         >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.ver.outputs.new }}"/' pyproject.toml

      - name: Update server.json
        run: |
          python3 - <<'PY'
          import json
          v = "${{ steps.ver.outputs.new }}"
          with open("server.json") as f:
              d = json.load(f)
          d["version"] = v
          d["packages"][0]["version"] = v
          with open("server.json", "w") as f:
              json.dump(d, f, indent=2)
              f.write("\n")
          PY

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b bump-${{ steps.ver.outputs.new }}
          git add pyproject.toml server.json
          git commit -m "chore: bump version to ${{ steps.ver.outputs.new }}"
          git push origin bump-${{ steps.ver.outputs.new }}
          gh pr create \
            --title "chore: bump version to ${{ steps.ver.outputs.new }}" \
            --body "Automated version bump: \`${{ steps.ver.outputs.current }}\` → \`${{ steps.ver.outputs.new }}\`

          Triggered automatically on push to main.

          Merging this PR will automatically publish \`${{ steps.ver.outputs.new }}\` to PyPI and the MCP Registry." \
            --base main
